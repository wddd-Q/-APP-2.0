# ============================================================
# 五行元素
# ============================================================
elements:
  - id: 0
    name: 金
  - id: 1
    name: 木
  - id: 2
    name: 水
  - id: 3
    name: 火
  - id: 4
    name: 土

element_interactions:
  generating:  # 相生
    - [0, 2]  # 金生水
    - [2, 1]  # 水生木
    - [1, 3]  # 木生火
    - [3, 4]  # 火生土
    - [4, 0]  # 土生金
  overcoming:  # 相克
    - [0, 1]  # 金克木
    - [1, 4]  # 木克土
    - [4, 2]  # 土克水
    - [2, 3]  # 水克火
    - [3, 0]  # 火克金

# ============================================================
# 弟子属性
# ============================================================
disciple_attributes:
  - id: bone_structure
    name: 根骨
    affects: [breakthrough_rate, tribulation_survival]
  - id: comprehension
    name: 悟性
    affects: [technique_learning, skill_progression]
  - id: fortune
    name: 福缘
    affects: [event_discovery, rare_encounter_rate]
  - id: mentality
    name: 心性
    affects: [heart_demon_resist, loyalty]
  - id: charm
    name: 魅力
    affects: [recruitment_quality, diplomacy, relationships]
  - id: talent
    name: 资质
    affects: [cultivation_speed]

# ============================================================
# 弟子技能
# ============================================================
